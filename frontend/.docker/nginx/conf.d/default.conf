client_max_body_size 100M;

upstream backend {
    server {{ .Env.URL_BACKEND }};
}

server {
    index index.html;
    root /var/www/public/;

    {{ if .Env.FRONTEND_SERVER_NAME }}
    server_name {{ .Env.FRONTEND_SERVER_NAME }};
    {{else}}
    server_name _;
    {{end}}

    {{ if .Env.FRONTEND_SERVER_NAME }}
    include include.d/ssl.conf;
    ssl_certificate /etc/nginx/ssl/{{ .Env.FRONTEND_SERVER_NAME }}/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/{{ .Env.FRONTEND_SERVER_NAME }}/privkey.pem;
    {{end}}

    include sites.d/frontend.conf;
    include include.d/letsencrypt.conf;
}

{{if .Env.BACKEND_SERVER_NAME}}
server {
    server_name {{ .Env.BACKEND_SERVER_NAME }};

    include include.d/ssl.conf;
    ssl_certificate /etc/nginx/ssl/{{ .Env.BACKEND_SERVER_NAME }}/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/{{ .Env.BACKEND_SERVER_NAME }}/privkey.pem;

    include sites.d/backend.conf;
    include include.d/letsencrypt.conf;
}
{{end}}